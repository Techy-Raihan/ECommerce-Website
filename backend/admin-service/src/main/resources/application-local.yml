spring:
  datasource:
    url: jdbc:h2:mem:shopnest_admin;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

eureka:
  client:
    enabled: false

logging:
  level:
    com.shopnest: DEBUG

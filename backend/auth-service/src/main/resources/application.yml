server:
  port: ${PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:h2:mem:auth_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect

eureka:
  client:
    serviceUrl:
      defaultZone: https://your-eureka-name.onrender.com/eureka/
  instance:
    preferIpAddress: true

jwt:
  secret: ${JWT_SECRET:shopnest-super-secret-key-2024-minimum-256-bits-long-enough}
  access-token-expiry: 900000
  refresh-token-expiry: 604800000
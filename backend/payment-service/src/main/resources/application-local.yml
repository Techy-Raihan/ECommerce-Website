spring:
  datasource:
    url: jdbc:h2:mem:shopnest_payment;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      retries: 0
      properties:
        max.block.ms: 500
        request.timeout.ms: 500
        delivery.timeout.ms: 1000

eureka:
  client:
    enabled: false

logging:
  level:
    com.shopnest: DEBUG

server:
  port: ${PORT:8080}

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:h2:mem:product_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
  cache:
    type: simple

eureka:
  client:
    serviceUrl:
      defaultZone: https://ecommerce-website-1-k2mq.onrender.com/eureka/
  instance:
    preferIpAddress: true
    hostname: ${RENDER_EXTERNAL_HOSTNAME}
spring:
  datasource:
    url: jdbc:h2:mem:shopnest_inventory;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: earliest
      properties:
        session.timeout.ms: 3000
        fetch.max.wait.ms: 500

eureka:
  client:
    enabled: false

logging:
  level:
    com.shopnest: DEBUG

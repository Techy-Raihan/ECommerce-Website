services:
  # ─── Infrastructure ───────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: shopnest-mysql
    environment:
      MYSQL_ROOT_PASSWORD: shopnest123
      MYSQL_USER: shopnest
      MYSQL_PASSWORD: shopnest123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pshopnest123"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: shopnest-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: shopnest-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: shopnest-kafka
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ─── Service Registry ─────────────────────────────────────────────────────
  eureka-server:
    build: ./backend/eureka-server
    container_name: shopnest-eureka
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      retries: 10

  # ─── API Gateway ──────────────────────────────────────────────────────────
  api-gateway:
    build: ./backend/api-gateway
    container_name: shopnest-gateway
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      EUREKA_HOST: eureka-server
      REDIS_HOST: redis
      JWT_SECRET: shopnest-super-secret-key-2024-minimum-256-bits-long-enough

  # ─── Microservices ────────────────────────────────────────────────────────
  auth-service:
    build: ./backend/auth-service
    container_name: shopnest-auth
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: shopnest123
      REDIS_HOST: redis
      EUREKA_HOST: eureka-server
      JWT_SECRET: shopnest-super-secret-key-2024-minimum-256-bits-long-enough

  user-service:
    build: ./backend/user-service
    container_name: shopnest-user
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: shopnest123
      EUREKA_HOST: eureka-server

  product-service:
    build: ./backend/product-service
    container_name: shopnest-product
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: shopnest123
      REDIS_HOST: redis
      EUREKA_HOST: eureka-server

  cart-service:
    build: ./backend/cart-service
    container_name: shopnest-cart
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: shopnest123
      EUREKA_HOST: eureka-server

  order-service:
    build: ./backend/order-service
    container_name: shopnest-order
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: shopnest123
      KAFKA_HOST: kafka
      EUREKA_HOST: eureka-server

  payment-service:
    build: ./backend/payment-service
    container_name: shopnest-payment
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: shopnest123
      KAFKA_HOST: kafka
      EUREKA_HOST: eureka-server

  inventory-service:
    build: ./backend/inventory-service
    container_name: shopnest-inventory
    ports:
      - "8087:8087"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: shopnest123
      KAFKA_HOST: kafka
      EUREKA_HOST: eureka-server

  notification-service:
    build: ./backend/notification-service
    container_name: shopnest-notification
    ports:
      - "8088:8088"
    depends_on:
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      KAFKA_HOST: kafka
      EUREKA_HOST: eureka-server

  admin-service:
    build: ./backend/admin-service
    container_name: shopnest-admin
    ports:
      - "8089:8089"
    depends_on:
      eureka-server:
        condition: service_healthy
    environment:
      EUREKA_HOST: eureka-server

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: shopnest-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  mysql_data:
